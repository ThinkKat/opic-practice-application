spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

aws:
  s3:
    enabled: true  # 운영 환경에서는 S3 활성화
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}

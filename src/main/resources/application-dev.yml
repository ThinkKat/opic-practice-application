spring:
  datasource:
    url: jdbc:h2:mem:opic_practice
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded

jwt:
  secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
  access-expiration: 900000       # 15분
  refresh-expiration: 1209600000  # 14일


management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics" # 필요한 것만 명시
        exclude: "env,beans,heapdump"

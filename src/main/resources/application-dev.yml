spring:
  datasource:
    url: jdbc:h2:mem:opic_practice
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: false

  sql:
    init:
      mode: embedded

jwt:
  secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
  expiration: 86400000  # 24 hours in milliseconds

aws:
  s3:
    enabled: false  # 개발 시 로컬 파일 시스템 사용
    # 테스트 시: -Daws.s3.enabled=true 로 활성화

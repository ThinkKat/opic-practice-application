spring:
  application:
    name: opic-practice

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:opic-practice}
    region: ${AWS_REGION:ap-northeast-2}
    presigned-url-expiration: 900
  lambda:
    feedback-function-name: ${AWS_LAMBDA_FEEDBACK_FUNCTION_NAME:opic-practice-audio-transcriber}

internal:
  api-key: ${INTERNAL_API_KEY}

file:
  allowed-types:
    - audio/mpeg
    - audio/wav
    - audio/m4a
    - audio/webm
    - audio/mp4

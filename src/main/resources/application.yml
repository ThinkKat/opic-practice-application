spring:
  application:
    name: opic-practice

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:opic-practice}
    region: ${AWS_REGION:ap-northeast-2}
    presigned-url-expiration: 900
  lambda:
    session-feedback-function-name: ${AWS_LAMBDA_SESSION_FEEDBACK_FUNCTION_NAME:opic-practice-audio-transcriber}
    drill-answer-feedback-function-name: ${AWS_LAMBDA_DRILL_ANSWER_FEEDBACK_FUNCTION_NAME:opic-practice-audio-transcriber}
    email-sender-function-name: ${AWS_LAMBDA_EMAIL_SENDER_FUNCTION_NAME:opic-practice-password-reset-email-sender}

password:
  reset:
    code:
      secret: ${PASSWORD_SECRET}
    session-expire-minutes: ${PASSWORD_RESET_SESSION_EXPIRE_MINUTES}
    code-expire-minutes: ${PASSWORD_RESET_CODE_EXPIRE_MINUTES}
    max-attempts: ${PASSWORD_RESET_MAX_ATTEMPTS}
    resend-cooldown-seconds: ${PASSWORD_RESET_RESEND_COOLDOWN_SECONDS}
    max-resend-count: ${PASSWORD_RESET_MAX_RESEND_COUNT}
    block-minutes: ${PASSWORD_RESET_BLOCK_MINUTES}

internal:
  api-key: ${INTERNAL_API_KEY}

scheduler:
  refresh-token-cleanup:
    cron: "0 0 4 * * *"
    retention-days: 90

file:
  allowed-types:
    - audio/mpeg
    - audio/wav
    - audio/m4a
    - audio/webm
    - audio/mp4

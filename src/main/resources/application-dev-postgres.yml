spring:
  datasource:
    url: jdbc:postgresql://localhost:54326/opic_practice
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

jwt:
  secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
  expiration: 86400000  # 24 hours in milliseconds

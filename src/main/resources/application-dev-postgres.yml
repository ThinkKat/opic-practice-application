spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    url: jdbc:postgresql://localhost:54326/opic_practice
    user: postgres
    password: postgres

  datasource:
    url: jdbc:postgresql://localhost:54326/opic_practice
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
  access-expiration: 900000       # 15분
  refresh-expiration: 1209600000  # 14일

internal:
  api-key: test

password:
  reset:
    code:
      secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
    session-expire-minutes: 100
    code-expire-minutes: 100
    max-attempts: 100
    resend-cooldown-seconds: 100
    max-resend-count: 100
    block-minutes: 100

aws:
  s3:
    bucket: opic-practice-test
  lambda:
    session-feedback-function-name: opic-transcription-test
    drill-answer-feedback-function-name: drill-transcription-test

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics" # 필요한 것만 명시
        exclude: "env,beans,heapdump"

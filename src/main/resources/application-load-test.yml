spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/opic_practice_loadtest}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        generate_statistics: ${SPRING_JPA_PROPERTIES_HIBERNATE_GENERATE_STATISTICS:false}
    show-sql: false

logging:
  level:
    root: WARN
    me.thinkcat.opic: INFO
  file:
    path: ${LOG_PATH:/tmp/logs/was}
    name: ${LOG_NAME:application}

jwt:
  secret: ${JWT_SECRET:load-test-secret-key-this-must-be-at-least-256-bits-long-for-hmac-sha}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

internal:
  api-key: ${INTERNAL_API_KEY:load-test-key}

password:
  reset:
    code:
      secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
    session-expire-minutes: 100
    code-expire-minutes: 100
    max-attempts: 100
    resend-cooldown-seconds: 100
    max-resend-count: 100
    block-minutes: 100

aws:
  s3:
    bucket: opic-practice-test
  lambda:
    session-feedback-function-name: opic-transcription-test
    drill-answer-feedback-function-name: drill-transcription-test

server:
  tomcat:
    mbeanregistry:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  metrics:
    tags:
      application: opic-practice
      env: load-test

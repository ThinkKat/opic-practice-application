spring:
  application:
    name: opic-practice

  datasource:
    url: jdbc:h2:mem:opic_practice
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: false

  sql:
    init:
      mode: embedded

jwt:
  secret: dev-secret-key-change-in-production-this-must-be-at-least-256-bits-long
  expiration: 86400000

internal:
  api-key: testtesttesttesttest

springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_0
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    csrf:
      enabled: true
  packages-to-scan: me.thinkcat.opic.practice
  paths-to-match: /api/v1/**

aws:
  s3:
    bucket: test
    region: ap-northeast-2
    presigned-url-expiration: 900
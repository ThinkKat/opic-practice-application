services:
  postgres:
    image: postgres:15
    container_name: opic-practice-db
    environment:
      POSTGRES_DB: opic_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54326:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:

name: DB Migration Branch Enforce

on:
  pull_request:
    branches:
      - main

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect migration changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migration:
              - 'src/main/resources/db/migration/**'

      - name: Enforce db-migration branch
        if: steps.changes.outputs.migration == 'true'
        run: |
          if [ "${{ github.head_ref }}" != "db-migration" ]; then
            echo "db/migration 변경은 db-migration 브랜치를 통해서만 main에 머지할 수 있습니다."
            exit 1
          fi

  notify:
    runs-on: ubuntu-latest
    needs: enforce
    if: always()
    steps:
      - name: Send Discord Webhook
        run: |
          STATUS="${{ needs.enforce.result }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          curl ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"${ICON} DB Migration 브랜치 규칙 검증 ${STATUS}\n저장소: ${{github.repository }}\nPR: ${{ github.event.pull_request.title }} (#${{github.event.pull_request.number }})\n요청자: ${{ github.actor }}\"}"
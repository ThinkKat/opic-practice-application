name: DB Migration Validate

on:
  pull_request:
    branches:
      - db-migration

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run integration tests
        run: ./gradlew integrationTest

  notify:
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Send Discord Webhook
        run: |
          STATUS="${{ needs.validate.result }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          curl ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"${ICON} DB Migration 통합 테스트 ${STATUS}\n저장소: ${{ github.repository }}\nPR: ${{ github.event.pull_request.title }} (#${{github.event.pull_request.number }})\n요청자: ${{ github.actor }}\"}"
name: Backend CI/CD to ECR (Docker Build)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Send Discord Webhook
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"빌드 결과: ${{ job.status }}\n저장소: ${{ github.repository }}\"}" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

  check-migration:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.migration }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migration:
              - 'src/main/resources/db/migration/**'

  db-migrate:
    needs: check-migration
    if: needs.check-migration.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Upload migration files to S3
        run: |
          aws s3 sync src/main/resources/db/migration/ \
            s3://${{ secrets.S3_MIGRATION_BUCKET }}

      - name: Invoke Flyway Lambda
        run: |
          aws lambda invoke \
            --function-name ${{ secrets.LAMBDA_FLYWAY_FUNCTION_NAME }} \
            --invocation-type RequestResponse \
            --log-type Tail \
            response.json
          cat response.json

      - name: Send Discord Webhook
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"DB 마이그레이션 결과: ${{ job.status }}\n저장소: ${{ github.repository }}\"}" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"